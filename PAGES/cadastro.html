<!DOCTYPE html>

<body>

    <form action="process-signup.php" method="post">

            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome">
        </div>
        
        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email">
        </div>

        <div>
            <label for="RM">RM</label>

        </div>
        
        <div>
